<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEIC to JPG Converter</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #f7fafc, #ebf4ff);
      }

      .container {
        width: min(880px, 94vw);
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 0.5rem;
      }

      p {
        margin-top: 0;
        color: #4a5568;
      }

      #dropzone {
        border: 2px dashed #718096;
        border-radius: 12px;
        padding: 2rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
      }

      #dropzone.dragging {
        border-color: #2b6cb0;
        background: #ebf8ff;
      }

      #pick,
      .btn {
        margin-top: 1rem;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        background: #2b6cb0;
        color: white;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .btn {
        margin-top: 0;
      }

      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      #status {
        margin-top: 1rem;
        min-height: 1.4rem;
        font-weight: 600;
      }

      .actions {
        margin-top: 0.5rem;
        display: flex;
        justify-content: flex-end;
      }

      table {
        width: 100%;
        margin-top: 1rem;
        border-collapse: collapse;
        font-size: 0.92rem;
      }

      th,
      td {
        border-bottom: 1px solid #e2e8f0;
        padding: 0.55rem;
        text-align: left;
      }

      .small {
        color: #4a5568;
        font-size: 0.85rem;
      }

      .badge-ok {
        color: #276749;
        font-weight: 600;
      }

      .badge-warn {
        color: #9c4221;
        font-weight: 600;
      }

      @media (max-width: 720px) {
        table,
        thead,
        tbody,
        th,
        td,
        tr {
          display: block;
        }

        thead {
          display: none;
        }

        tr {
          border: 1px solid #e2e8f0;
          margin-bottom: 0.5rem;
          border-radius: 8px;
          padding: 0.3rem;
        }

        td {
          border: none;
          padding: 0.35rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>HEIC to JPG Converter</h1>
      <p>
        Drag iPhone HEIC/HEIF photos here (or click to choose). The converter automatically aims
        to keep each JPG within ±20% of the original file size.
      </p>

      <section id="dropzone" aria-label="HEIC dropzone">
        <strong>Drag & drop HEIC files here</strong>
        <div>or</div>
        <button id="pick" type="button">Choose files</button>
        <input id="fileInput" type="file" accept=".heic,.heif,image/heic,image/heif" multiple hidden />
      </section>

      <div id="status" aria-live="polite"></div>

      <div class="actions">
        <button class="btn" id="downloadAll" type="button" disabled>Download all as ZIP</button>
      </div>

      <table id="results" hidden>
        <thead>
          <tr>
            <th>File</th>
            <th>Original</th>
            <th>JPG</th>
            <th>Size delta</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="resultRows"></tbody>
      </table>
    </main>

    <script>
      const dropzone = document.getElementById('dropzone');
      const fileInput = document.getElementById('fileInput');
      const pick = document.getElementById('pick');
      const status = document.getElementById('status');
      const resultRows = document.getElementById('resultRows');
      const resultsTable = document.getElementById('results');
      const downloadAllButton = document.getElementById('downloadAll');

      const HEIC2ANY_CDN_URLS = [
        'https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js',
        'https://unpkg.com/heic2any/dist/heic2any.min.js'
      ];

      const JSZIP_CDN_URLS = [
        'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js',
        'https://unpkg.com/jszip@3.10.1/dist/jszip.min.js'
      ];

      const LIBHEIF_CDN_URLS = [
        'https://cdn.jsdelivr.net/npm/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js',
        'https://unpkg.com/libheif-js@1.19.8/libheif-wasm/libheif-bundle.js'
      ];

      const HEIC_MIME_TYPES = new Set([
        'image/heic',
        'image/heic-sequence',
        'image/heif',
        'image/heif-sequence'
      ]);

      const convertedItems = [];
      let heic2AnyLoadPromise = null;
      let jsZipLoadPromise = null;
      let libheifLoadPromise = null;

      const setStatus = (message, isError = false) => {
        status.textContent = message;
        status.style.color = isError ? '#c53030' : '#2d3748';
      };

      const formatBytes = (bytes) => {
        if (bytes < 1024) return `${bytes} B`;
        if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
        return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
      };

      const formatPercent = (value) => `${value > 0 ? '+' : ''}${value.toFixed(1)}%`;

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.head.appendChild(script);
        });

      const ensureLibrary = async (globalName, urls, cachePromiseRef) => {
        if (typeof window[globalName] !== 'undefined') {
          return window[globalName];
        }

        if (!cachePromiseRef.current) {
          cachePromiseRef.current = (async () => {
            for (const url of urls) {
              try {
                await loadScript(url);
                if (typeof window[globalName] !== 'undefined') {
                  return window[globalName];
                }
              } catch {
                // try next CDN
              }
            }
            throw new Error(`Unable to load ${globalName} from CDN`);
          })();
        }

        return cachePromiseRef.current;
      };

      const ensureHeic2AnyLoaded = () =>
        ensureLibrary('heic2any', HEIC2ANY_CDN_URLS, {
          get current() {
            return heic2AnyLoadPromise;
          },
          set current(value) {
            heic2AnyLoadPromise = value;
          }
        });

      const ensureJsZipLoaded = () =>
        ensureLibrary('JSZip', JSZIP_CDN_URLS, {
          get current() {
            return jsZipLoadPromise;
          },
          set current(value) {
            jsZipLoadPromise = value;
          }
        });
      const resolveLibheifDecoder = async () => {
        const directCandidates = [window.libheif, window.libheifwasm, window.LibHeif, window.Module];
        for (const candidate of directCandidates) {
          if (candidate && typeof candidate.HeifDecoder === 'function') {
            return candidate;
          }
        }

        const factoryCandidates = [window.libheif, window.libheifwasm, window.LibHeif];
        for (const factory of factoryCandidates) {
          if (typeof factory === 'function') {
            try {
              const module = await factory();
              if (module && typeof module.HeifDecoder === 'function') {
                return module;
              }
            } catch {
              // try next factory candidate
            }
          }
        }

        return null;
      };

      const ensureLibheifLoaded = async () => {
        const resolved = await resolveLibheifDecoder();
        if (resolved) {
          return resolved;
        }

        if (!libheifLoadPromise) {
          libheifLoadPromise = (async () => {
            for (const url of LIBHEIF_CDN_URLS) {
              try {
                await loadScript(url);
                const decoder = await resolveLibheifDecoder();
                if (decoder) {
                  return decoder;
                }
              } catch {
                // try next CDN
              }
            }

            throw new Error('Unable to initialize libheif-js decoder from CDN');
          })();
        }

        return libheifLoadPromise;
      };

      const isHeicFile = (file) => {
        const name = file.name.toLowerCase();
        return HEIC_MIME_TYPES.has(file.type) || name.endsWith('.heic') || name.endsWith('.heif');
      };

      const detectMimeFromFtyp = (bytes) => {
        if (bytes.byteLength < 20) return null;

        const readBrand = (offset) =>
          String.fromCharCode(bytes[offset], bytes[offset + 1], bytes[offset + 2], bytes[offset + 3]).toLowerCase();

        const majorBrand = readBrand(8);
        const compatibleBrands = [];

        for (let offset = 16; offset + 3 < bytes.byteLength && compatibleBrands.length < 8; offset += 4) {
          const brand = readBrand(offset);
          if (/^[a-z0-9]{4}$/.test(brand)) {
            compatibleBrands.push(brand);
          }
        }

        const allBrands = new Set([majorBrand, ...compatibleBrands]);

        const heicSingleBrands = new Set(['heic', 'heix', 'hevc', 'hevx', 'heim', 'hevm']);
        const heicSequenceBrands = new Set(['heis', 'hevs']);
        const heifSingleBrands = new Set(['mif1', 'heif']);
        const heifSequenceBrands = new Set(['msf1']);
        const avifBrands = new Set(['avif', 'avis']);

        if ([...allBrands].some((brand) => avifBrands.has(brand))) {
          return 'image/avif';
        }

        if ([...allBrands].some((brand) => heicSequenceBrands.has(brand))) {
          return 'image/heic-sequence';
        }

        if ([...allBrands].some((brand) => heicSingleBrands.has(brand))) {
          return 'image/heic';
        }

        if ([...allBrands].some((brand) => heifSequenceBrands.has(brand))) {
          return 'image/heif-sequence';
        }

        if ([...allBrands].some((brand) => heifSingleBrands.has(brand))) {
          return 'image/heif';
        }

        return null;
      };

      const normalizeHeicBlob = async (file) => {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const detectedMime = detectMimeFromFtyp(bytes);
        const normalizedMime = detectedMime || (HEIC_MIME_TYPES.has(file.type) ? file.type : null);

        if (normalizedMime) {
          return new Blob([bytes], { type: normalizedMime });
        }

        const name = file.name.toLowerCase();
        const mimeType = name.endsWith('.heif') ? 'image/heif' : 'image/heic-sequence';
        return new Blob([bytes], { type: mimeType });
      };

      const toSingleBlob = (value) => (Array.isArray(value) ? value[0] : value);

      const decodeWithHeic2Any = async (file, toType) => {
        const heic2anyFn = await ensureHeic2AnyLoaded();

        const normalized = await normalizeHeicBlob(file);
        if (normalized.type === 'image/avif') {
          throw new Error('AVIF detected. This tool supports HEIC/HEIF only.');
        }

        const rawBytes = await file.arrayBuffer();

        const blobVariants = [
          file,
          normalized,
          new Blob([rawBytes], { type: 'image/heic' }),
          new Blob([rawBytes], { type: 'image/heic-sequence' }),
          new Blob([rawBytes], { type: 'image/heif' }),
          new Blob([rawBytes], { type: 'image/heif-sequence' })
        ];

        const attempts = [];

        for (const blobVariant of blobVariants) {
          for (const multiple of [false, true]) {
            try {
              const converted = await heic2anyFn({
                blob: blobVariant,
                toType,
                multiple,
                quality: 0.92
              });

              return toSingleBlob(converted);
            } catch (error) {
              const msg = error && error.message ? error.message : 'unknown decoder error';
              attempts.push(`${blobVariant.type || 'unknown-type'}${multiple ? ' multiple' : ''}: ${msg}`);
            }
          }
        }

        throw new Error(`Unable to decode this HEIC file (${attempts.slice(0, 4).join('; ')})`);
      };

      const bitmapFromImageElement = async (blobLike) => {
        const url = URL.createObjectURL(blobLike);

        try {
          const img = await new Promise((resolve, reject) => {
            const element = new Image();
            element.onload = () => resolve(element);
            element.onerror = () => reject(new Error('Image element decode failed.'));
            element.src = url;
          });

          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth || img.width;
          canvas.height = img.naturalHeight || img.height;

          if (!canvas.width || !canvas.height) {
            throw new Error('Image decode produced invalid dimensions.');
          }

          const context = canvas.getContext('2d');
          if (!context) {
            throw new Error('Canvas context unavailable.');
          }

          context.drawImage(img, 0, 0);
          return await createImageBitmap(canvas);
        } finally {
          URL.revokeObjectURL(url);
        }
      };

      const bitmapFromImageDecoder = async (blobLike, preferredType) => {
        if (typeof ImageDecoder === 'undefined') {
          throw new Error('ImageDecoder API unavailable.');
        }

        const typeCandidates = [
          preferredType,
          blobLike.type,
          'image/heic',
          'image/heif'
        ].filter(Boolean);

        const bytes = new Uint8Array(await blobLike.arrayBuffer());
        let lastError = null;

        for (const type of typeCandidates) {
          let decoder;

          try {
            decoder = new ImageDecoder({
              data: bytes,
              type,
              preferAnimation: false
            });

            if (decoder.tracks && decoder.tracks.ready) {
              await decoder.tracks.ready;
            }

            const result = await decoder.decode({ frameIndex: 0 });
            const frame = result.image;

            const canvas = document.createElement('canvas');
            canvas.width = frame.displayWidth || frame.codedWidth;
            canvas.height = frame.displayHeight || frame.codedHeight;

            const context = canvas.getContext('2d');
            if (!context) {
              frame.close();
              throw new Error('Canvas context unavailable.');
            }

            context.drawImage(frame, 0, 0);
            frame.close();
            decoder.close();

            return await createImageBitmap(canvas);
          } catch (error) {
            lastError = error;
            if (decoder) {
              try {
                decoder.close();
              } catch {
                // ignore close errors
              }
            }
          }
        }

        throw lastError || new Error('ImageDecoder decode failed.');
      };


      const bitmapFromLibheifJs = async (file) => {
        const libheif = await ensureLibheifLoaded();
        if (!libheif || !libheif.HeifDecoder) {
          throw new Error('libheif decoder unavailable.');
        }

        const decoder = new libheif.HeifDecoder();
        const bytes = new Uint8Array(await file.arrayBuffer());
        const images = decoder.decode(bytes);

        if (!images || !images.length) {
          throw new Error('libheif decode returned no images.');
        }

        const image = images[0];
        const width = image.get_width();
        const height = image.get_height();
        const output = {
          width,
          height,
          data: new Uint8ClampedArray(width * height * 4)
        };

        const imageData = await new Promise((resolve, reject) => {
          image.display(output, (displayData) => {
            if (!displayData || !displayData.data) {
              reject(new Error('libheif display failed.'));
              return;
            }
            resolve(displayData);
          });
        });

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;

        const context = canvas.getContext('2d');
        if (!context) {
          throw new Error('Canvas context unavailable.');
        }

        context.putImageData(new ImageData(imageData.data, width, height), 0, 0);
        return await createImageBitmap(canvas);
      };

      const bitmapFromFile = async (file) => {
        try {
          return await createImageBitmap(file);
        } catch {
          // Continue to fallback paths below.
        }

        try {
          return await bitmapFromImageElement(file);
        } catch {
          // Continue to fallback paths below.
        }

        try {
          return await bitmapFromImageDecoder(file, file.type || 'image/heic');
        } catch {
          // Continue to normalized blob fallbacks.
        }

        let normalized;

        try {
          normalized = await normalizeHeicBlob(file);
          return await bitmapFromImageElement(normalized);
        } catch {
          // Continue to fallback paths below.
        }

        try {
          if (!normalized) {
            normalized = await normalizeHeicBlob(file);
          }
          return await bitmapFromImageDecoder(normalized, normalized.type || 'image/heic');
        } catch {
          // Continue to decoder libraries.
        }

        try {
          const pngBlob = await decodeWithHeic2Any(file, 'image/png');
          return await createImageBitmap(pngBlob);
        } catch {
          // Continue to next fallback.
        }

        try {
          const jpegBlob = await decodeWithHeic2Any(file, 'image/jpeg');
          return await createImageBitmap(jpegBlob);
        } catch {
          // Continue to next fallback.
        }

        return await bitmapFromLibheifJs(file);
      };

      const canvasBlob = (canvas, quality) =>
        new Promise((resolve, reject) => {
          canvas.toBlob(
            (blob) => {
              if (!blob) {
                reject(new Error('JPG encoding failed.'));
                return;
              }
              resolve(blob);
            },
            'image/jpeg',
            quality
          );
        });

      const encodeNearOriginalSize = async (bitmap, originalSize) => {
        const canvas = document.createElement('canvas');
        canvas.width = bitmap.width;
        canvas.height = bitmap.height;

        const context = canvas.getContext('2d');
        if (!context) {
          throw new Error('Canvas context unavailable.');
        }

        context.drawImage(bitmap, 0, 0);

        const minTarget = originalSize * 0.8;
        const maxTarget = originalSize * 1.2;

        let low = 0.45;
        let high = 0.98;
        let bestBlob = await canvasBlob(canvas, 0.86);
        let bestDiff = Math.abs(bestBlob.size - originalSize);

        for (let i = 0; i < 7; i += 1) {
          const quality = Number(((low + high) / 2).toFixed(3));
          const attempt = await canvasBlob(canvas, quality);
          const diff = Math.abs(attempt.size - originalSize);

          if (diff < bestDiff) {
            bestBlob = attempt;
            bestDiff = diff;
          }

          if (attempt.size >= minTarget && attempt.size <= maxTarget) {
            bestBlob = attempt;
            break;
          }

          if (attempt.size > maxTarget) {
            high = quality;
          } else {
            low = quality;
          }
        }

        return bestBlob;
      };

      const clearResults = () => {
        convertedItems.forEach((item) => URL.revokeObjectURL(item.url));
        convertedItems.length = 0;
        resultRows.innerHTML = '';
        resultsTable.hidden = true;
        downloadAllButton.disabled = true;
      };

      const addResultRow = (originalFile, jpgBlob) => {
        const baseName = originalFile.name.replace(/\.(heic|heif)$/i, '');
        const downloadName = `${baseName || 'converted'}.jpg`;
        const url = URL.createObjectURL(jpgBlob);

        const deltaPercent = ((jpgBlob.size - originalFile.size) / originalFile.size) * 100;
        const withinRange = Math.abs(deltaPercent) <= 20;

        const item = {
          originalName: originalFile.name,
          outputName: downloadName,
          blob: jpgBlob,
          url
        };
        convertedItems.push(item);

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div>${originalFile.name}</div>
            <div class="small">${downloadName}</div>
          </td>
          <td>${formatBytes(originalFile.size)}</td>
          <td>${formatBytes(jpgBlob.size)}</td>
          <td class="${withinRange ? 'badge-ok' : 'badge-warn'}">${formatPercent(deltaPercent)}</td>
          <td><button class="btn" type="button">Download</button></td>
        `;

        tr.querySelector('button').addEventListener('click', () => {
          const a = document.createElement('a');
          a.href = item.url;
          a.download = item.outputName;
          a.click();
        });

        resultRows.appendChild(tr);
      };

      const handleFiles = async (fileList) => {
        const files = Array.from(fileList || []);
        if (!files.length) {
          setStatus('No files selected.', true);
          return;
        }

        clearResults();

        const heicFiles = files.filter(isHeicFile);
        if (!heicFiles.length) {
          setStatus('Please choose HEIC or HEIF files only.', true);
          return;
        }

        setStatus(`Converting ${heicFiles.length} file(s)...`);

        let convertedCount = 0;
        let outOfRangeCount = 0;

        for (const file of heicFiles) {
          try {
            const bitmap = await bitmapFromFile(file);
            const jpgBlob = await encodeNearOriginalSize(bitmap, file.size);
            bitmap.close();

            const deltaPercent = ((jpgBlob.size - file.size) / file.size) * 100;
            if (Math.abs(deltaPercent) > 20) {
              outOfRangeCount += 1;
            }

            addResultRow(file, jpgBlob);
            convertedCount += 1;
          } catch (error) {
            console.error(error);
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${file.name}</td>
              <td>${formatBytes(file.size)}</td>
              <td colspan="3" class="badge-warn">Failed: ${error.message || 'Unknown error'}</td>
            `;
            resultRows.appendChild(tr);
          }
        }

        if (resultRows.children.length > 0) {
          resultsTable.hidden = false;
        }

        if (convertedCount > 0) {
          resultsTable.hidden = false;
          downloadAllButton.disabled = false;
        }

        if (convertedCount === 0) {
          setStatus('No files were converted.', true);
        } else if (outOfRangeCount > 0) {
          setStatus(
            `Converted ${convertedCount} file(s). ${outOfRangeCount} file(s) could not be kept within ±20%, but were set as close as possible.`,
            false
          );
        } else {
          setStatus(`Done! Converted ${convertedCount} file(s), all within ±20% size range.`);
        }
      };

      downloadAllButton.addEventListener('click', async () => {
        if (!convertedItems.length) return;

        downloadAllButton.disabled = true;
        setStatus('Preparing ZIP download...');

        try {
          const JSZipLib = await ensureJsZipLoaded();
          const zip = new JSZipLib();

          convertedItems.forEach((item) => {
            zip.file(item.outputName, item.blob);
          });

          const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
          const zipUrl = URL.createObjectURL(zipBlob);

          const link = document.createElement('a');
          link.href = zipUrl;
          link.download = 'converted-jpgs.zip';
          link.click();

          setTimeout(() => URL.revokeObjectURL(zipUrl), 10000);
          setStatus(`ZIP ready: downloaded ${convertedItems.length} JPG file(s).`);
        } catch (error) {
          console.error(error);
          setStatus(`ZIP creation failed: ${error.message || 'Unknown error'}`, true);
        } finally {
          downloadAllButton.disabled = false;
        }
      });

      dropzone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropzone.classList.add('dragging');
      });

      dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragging');
      });

      dropzone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragging');
        handleFiles(event.dataTransfer.files);
      });

      dropzone.addEventListener('click', () => fileInput.click());
      pick.addEventListener('click', (event) => {
        event.stopPropagation();
        fileInput.click();
      });

      fileInput.addEventListener('change', () => handleFiles(fileInput.files));
    </script>
  </body>
</html>
